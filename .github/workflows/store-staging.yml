name: Store staging readiness
on:
  workflow_dispatch:
    inputs:
      channel:
        type: choice
        required: true
        options: [chrome, edge, firefox]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    environment: store-staging
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.16.0'
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check
      - run: npm run build:release
      - run: npm run store:readiness
      - run: npm run evidence:attest
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: store-staging-${{ inputs.channel }}
          path: |
            dist/artifacts
            dist/evidence

# Upload and publish actions are intentionally omitted. Store credentials, manual approval,
# signed-artifact verification, and staged rollout evidence are required before publication.
