name: Legacy Full Check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TZ: UTC
      LC_ALL: C
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
      NPM_CONFIG_REPLACE_REGISTRY_HOST: always
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.x'
      - name: Install deterministic dev dependencies
        run: |
          node --version
          npm --version
          npm config get registry
          npm config get replace-registry-host
          rm -rf node_modules
          node scripts/ci-sanitize-package-lock-registry.mjs
          npm_config_cache="$RUNNER_TEMP/npm-cache" npm ci --include=dev --ignore-scripts --no-audit --fund=false --registry=https://registry.npmjs.org/ --replace-registry-host=always
          test -x node_modules/.bin/prettier
          test -x node_modules/.bin/tsc
          test -x node_modules/.bin/eslint
          test -x node_modules/.bin/vitest
      - name: Run legacy monolithic check
        run: npm run check
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: rtlx-legacy-full-check-output
          path: |
            dist/chromium
            dist/edge
            dist/firefox
            dist/firefox-android
            dist/evidence
            dist/artifacts
          if-no-files-found: ignore
