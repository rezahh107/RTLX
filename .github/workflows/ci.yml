name: CI
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TZ: UTC
      LC_ALL: C
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.x'
      - name: Show Node and npm versions
        run: |
          node --version
          npm --version
      - name: Install dependencies with isolated npm cache
        run: |
          rm -rf node_modules
          npm_config_cache="$RUNNER_TEMP/npm-cache" npm ci --include=dev --ignore-scripts --no-audit --fund=false
          test -x node_modules/.bin/prettier
          test -x node_modules/.bin/tsc
          test -x node_modules/.bin/eslint
      - run: npm run check
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rtlx-development-builds
          path: |
            dist/chromium
            dist/edge
            dist/firefox
            dist/firefox-android
          if-no-files-found: error
