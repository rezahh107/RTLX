name: Release candidate certification
on:
  workflow_dispatch:
  push:
    tags: ['v*']
permissions:
  contents: read
jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: release-candidate
    env:
      TZ: UTC
      LC_ALL: C
      RTLX_FIREFOX_ID: ${{ secrets.RTLX_FIREFOX_ID }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.16.0'
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check
      - run: npm run build:release
      - run: npm run package:source
      - run: npm run store:readiness
      - run: npm run evidence:gates
      - run: npm run evidence:attest
      - run: npm run evidence:verify
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rtlx-release-candidate
          path: |
            dist/artifacts
            dist/evidence
          if-no-files-found: error
